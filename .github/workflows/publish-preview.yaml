name: Publish Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'ROADMAP.md'
      - 'mkdocs.yml'
      - 'requirements.txt'

permissions: write-all

jobs:
  publish:
    uses: LayeredCraft/devops-templates/.github/workflows/publish-preview.yml@v8.0
    with:
      solution: LayeredCraft.DynamoMapper.slnx
      dotnetVersion: |
        8.0.x
        9.0.x
        10.0.x
        11.0.x
      hasTests: true
    secrets: inherit
